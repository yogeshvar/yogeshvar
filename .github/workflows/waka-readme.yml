name: Waka README stats

on:
  schedule:
    - cron: "0 11 * * *" # every day 11:00 UTC (~6am US/Eastern standard time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with dev metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@v5
        with:
          GH_TOKEN: ${{ github.token }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SECTION_NAME: waka
          # Drop heavy / noisy blocks
          SHOW_LOC_CHART: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_LINES_OF_CODE: "False"
          # Keep the rest (badges, commit habits, WakaTime week, languages per repo)
          SHOW_PROFILE_VIEWS: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_TIMEZONE: "True"
          SHOW_LANGUAGE: "True"
          SHOW_EDITORS: "True"
          SHOW_PROJECTS: "True"
          SHOW_OS: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_TOTAL_CODE_TIME: "True"
          SHOW_UPDATED_DATE: "True"
          COMMIT_MESSAGE: "chore: update dev metrics"
