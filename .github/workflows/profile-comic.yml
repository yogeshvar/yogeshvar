name: Weekly profile (Waka stats + comic)

on:
  schedule:
    - cron: "0 11 * * 1" # Monday 11:00 UTC (~6am US/Eastern standard time)
  workflow_dispatch:
    inputs:
      comic_force:
        description: "Regenerate even when WakaTime stats are unchanged"
        type: boolean
        default: false
      use_placeholder_stats:
        description: "Skip WakaTime; use random demo stats (testing without real data)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: weekly-profile
  cancel-in-progress: true

jobs:
  waka-readme:
    name: Update README with dev metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@v5
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SECTION_NAME: waka
          SHOW_LOC_CHART: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_LINES_OF_CODE: "False"
          SHOW_PROFILE_VIEWS: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_TIMEZONE: "True"
          SHOW_LANGUAGE: "True"
          SHOW_EDITORS: "True"
          SHOW_PROJECTS: "True"
          SHOW_OS: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_TOTAL_CODE_TIME: "True"
          SHOW_UPDATED_DATE: "True"
          COMMIT_MESSAGE: "chore: update dev metrics"

  profile-comic:
    name: Generate weekly comic
    needs: waka-readme
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-profile-comic.txt

      - name: Require GEMINI_API_KEY secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "::error title=Missing secret::Add repository secret GEMINI_API_KEY (Google AI Studio → API key)."
            exit 1
          fi

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r scripts/requirements-profile-comic.txt

      - name: Generate comic and patch README
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          COMIC_FORCE: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.comic_force == true || github.event.inputs.comic_force == 'true') && '1' || '' }}
          COMIC_USE_PLACEHOLDER: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.use_placeholder_stats == true || github.event.inputs.use_placeholder_stats == 'true') && '1' || '' }}
          # Long calls + retries for Gemini image/text (503 / deadline expired in CI).
          GEMINI_HTTP_TIMEOUT_MS: "600000"
          GEMINI_HTTP_RETRY_ATTEMPTS: "6"
        run: python scripts/generate_profile_comic.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # -A stages adds and deletes (e.g. clearing .last_wakatime_hash on placeholder runs).
          git add -A -- README.md COMIC_BOOK.md assets/comic/ .github/.last_wakatime_hash
          if git diff --staged --quiet; then
            echo "No README or comic asset changes to commit."
          else
            git commit -m "chore: refresh weekly dev comic"
            # Sync with remote (commits that landed during the long generate step).
            git fetch origin
            git pull --rebase --autostash origin "${{ github.ref_name }}"
            git push
          fi
